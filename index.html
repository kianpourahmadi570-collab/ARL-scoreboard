<!DOCTYPE html>
<html>
<head>
    <title>NRL Scoreboard - Live</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        body { 
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1513297887119-d46091b24bfa?auto=format&fit=crop&q=80&w=2070');
            background-size: cover; background-position: center; color: white; font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .board { 
            position: relative; background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); width: 750px; 
            padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.9); 
        }

        /* FINALS STICKER */
        #finalsSticker {
            position: absolute; top: -15px; left: -15px; background: #ffd700; color: black;
            padding: 8px 15px; font-weight: 900; border-radius: 8px; transform: rotate(-10deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: none; z-index: 10;
        }

        /* TRY ANIMATION */
        .try-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffcc00; color: black; display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: 900; border-radius: 50%; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 5;
        }
        .show-try { opacity: 1; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .header { display: flex; justify-content: space-between; align-items: center; color: #4caf50; font-weight: bold; font-size: 14px; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .timer-container { text-align: center; flex: 1; }
        #timer { font-size: 36px; font-weight: 800; display: block; color: white; }
        #mainLogo { width: 65px; height: auto; }
        
        .main { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team { flex: 1; position: relative; }
        .team img { width: 110px; height: 110px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 50%; padding: 10px; }
        .score { font-size: 100px; font-weight: 900; flex: 1.5; color: #fff; }
        .team-name { font-size: 26px; font-weight: bold; color: #fff; text-transform: uppercase; }

        #alertBox { margin-top: 20px; width: 750px; background: rgba(183, 28, 28, 0.9); padding: 15px 0; border-radius: 12px; font-weight: bold; font-size: 20px; text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="board">
        <div id="finalsSticker">FINALS SERIES</div>
        <div class="header">
            <span>AUSTRALIAN RUGBY LEAGUE</span>
            <div class="timer-container">
                <span id="timer">0:00</span>
                <img id="mainLogo" src="https://upload.wikimedia.org/wikipedia/en/0/02/National_Rugby_League_logo.svg">
            </div>
            <div style="text-align: right; width: 100px;">
                <span style="color: #ff4d4d; animation: blinker 2s infinite;">LIVE</span><br>
                <span id="matchStatus" style="font-size: 12px; color: #ff4d4d;">1ST HALF</span>
            </div>
        </div>
        <div class="main">
            <div class="team">
                <div id="hTry" class="try-overlay">TRY!</div>
                <img id="hLogo" src="https://placehold.co/110x110/222/white?text=LOGO">
                <div class="team-name" id="hName">Home</div>
            </div>
            <div class="score"><span id="hScore">0</span> - <span id="aScore">0</span></div>
            <div class="team">
                <div id="aTry" class="try-overlay">TRY!</div>
                <img id="aLogo" src="https://placehold.co/110x110/222/white?text=LOGO">
                <div class="team-name" id="aName">Away</div>
            </div>
        </div>
    </div>
    <div id="alertBox"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8Ju6YR84BY8r2a7PtAzC41wLiPzU_Qck",
            authDomain: "arl-scoreboard.firebaseapp.com",
            databaseURL: "https://arl-scoreboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "arl-scoreboard",
            storageBucket: "arl-scoreboard.firebasestorage.app",
            messagingSenderId: "530209602301",
            appId: "1:530209602301:web:bf49f782881dbac7135c94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'nrlMatch');

        onValue(matchRef, (snap) => {
            const data = snap.val() || {};
            document.getElementById('hScore').innerText = data.hScore ?? 0;
            document.getElementById('aScore').innerText = data.aScore ?? 0;
            document.getElementById('hName').innerText = data.hName || "Home";
            document.getElementById('aName').innerText = data.aName || "Away";
            document.getElementById('matchStatus').innerText = data.status || "1ST HALF";
            document.getElementById('finalsSticker').style.display = data.isFinals ? 'block' : 'none';

            // TRY ANIMATION LOGIC
            if(data.tryHome) {
                document.getElementById('hTry').classList.add('show-try');
                setTimeout(() => update(matchRef, { tryHome: false }), 3000);
            } else { document.getElementById('hTry').classList.remove('show-try'); }

            if(data.tryAway) {
                document.getElementById('aTry').classList.add('show-try');
                setTimeout(() => update(matchRef, { tryAway: false }), 3000);
            } else { document.getElementById('aTry').classList.remove('show-try'); }

            if (data.hLogo) document.getElementById('hLogo').src = data.hLogo;
            if (data.aLogo) document.getElementById('aLogo').src = data.aLogo;
            if (data.mainLogo) document.getElementById('mainLogo').src = data.mainLogo;
            if (data.bgUrl) document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('${data.bgUrl}')`;

            const alertBox = document.getElementById('alertBox');
            if (data.alertMsg && data.showAlert) { alertBox.innerText = data.alertMsg; alertBox.style.display = 'block'; } 
            else { alertBox.style.display = 'none'; }

            let totalSeconds = Number(data.time) || 0;
            let m = Math.floor(totalSeconds / 60); let s = totalSeconds % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        });
    </script>
</body>
</html>
