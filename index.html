<!DOCTYPE html>
<html>
<head>
    <title>ARL Scoreboard - Live</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .board { background: #1f1f1f; width: 600px; padding: 20px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; color: #4caf50; font-weight: bold; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .main { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team { flex: 1; }
        .team img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; background: #2a2a2a; border-radius: 50%; padding: 5px; }
        .score { font-size: 72px; font-weight: bold; flex: 1.5; color: #fff; }
        .team-name { font-size: 20px; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="board">
        <div class="header">
            <span>AUSTRALIAN RUGBY LEAGUE</span>
            <span id="timer">00:00</span>
        </div>
        <div class="main">
            <div class="team">
                <img id="hLogo" src="https://placehold.co/80x80/222/white?text=LOGO">
                <div class="team-name" id="hName">Home</div>
            </div>
            <div class="score">
                <span id="hScore">0</span> - <span id="aScore">0</span>
            </div>
            <div class="team">
                <img id="aLogo" src="https://placehold.co/80x80/222/white?text=LOGO">
                <div class="team-name" id="aName">Away</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8Ju6YR84BY8r2a7PtAzC41wLiPzU_Qck",
            authDomain: "arl-scoreboard.firebaseapp.com",
            databaseURL: "https://arl-scoreboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "arl-scoreboard",
            storageBucket: "arl-scoreboard.firebasestorage.app",
            messagingSenderId: "530209602301",
            appId: "1:530209602301:web:bf49f782881dbac7135c94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'nrlMatch'), (snap) => {
            const data = snap.val() || { hScore: 0, aScore: 0, hName: "Home", aName: "Away", time: 0, hLogo: "", aLogo: "" };
            
            document.getElementById('hScore').innerText = data.hScore;
            document.getElementById('aScore').innerText = data.aScore;
            document.getElementById('hName').innerText = data.hName;
            document.getElementById('aName').innerText = data.aName;
            
            if(data.hLogo) document.getElementById('hLogo').src = data.hLogo;
            if(data.aLogo) document.getElementById('aLogo').src = data.aLogo;

            let m = Math.floor(data.time / 60);
            let s = data.time % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        });
    </script>
</body>
</html>
