<!DOCTYPE html>
<html>
<head>
    <title>ARL ADMIN - PC MASTER</title>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; padding: 30px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; }
        
        h3 { margin-top: 0; color: #4caf50; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        button { padding: 15px 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; background: #333; color: white; flex: 1; }
        button:hover { background: #444; }

        .btn-try { background: #ffcc00; color: black; font-size: 18px; }
        .btn-add { background: #2e7d32; font-size: 20px; }
        .btn-sub { background: #c62828; }
        .btn-status { background: #6a1b9a; }
        .btn-main { background: #007bff; padding: 20px; font-size: 18px; width: 100%; }

        input { width: 95%; padding: 12px; margin-bottom: 15px; background: #262626; border: 1px solid #444; color: white; border-radius: 5px; }
        .score-display { font-size: 40px; font-weight: 900; text-align: center; margin-bottom: 10px; color: #ffcc00; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">NRL BROADCAST CONTROL</h1>
    
    <div class="grid">
        <div class="card">
            <h3>Match Action</h3>
            <div class="btn-row">
                <button class="btn-try" onclick="triggerTry('tryHome')">HOME TRY!</button>
                <button class="btn-try" onclick="triggerTry('tryAway')">AWAY TRY!</button>
            </div>
            <button class="btn-main" style="background:#ffd700; color:black; margin-bottom:20px;" onclick="toggleFinals()">TOGGLE FINALS SERIES STICKER</button>

            <h3>Live Scores</h3>
            <div class="btn-row">
                <div style="flex:1; text-align:center;">
                    <div class="score-display" id="disp_hScore">0</div>
                    <button class="btn-add" onclick="changeScore('hScore', 4)">+4</button>
                    <button class="btn-add" onclick="changeScore('hScore', 2)">+2</button>
                    <button class="btn-sub" onclick="changeScore('hScore', -1)">-1</button>
                </div>
                <div style="flex:1; text-align:center;">
                    <div class="score-display" id="disp_aScore">0</div>
                    <button class="btn-add" onclick="changeScore('aScore', 4)">+4</button>
                    <button class="btn-add" onclick="changeScore('aScore', 2)">+2</button>
                    <button class="btn-sub" onclick="changeScore('aScore', -1)">-1</button>
                </div>
            </div>

            <h3>Time Control</h3>
            <button id="tBtn" class="btn-main" onclick="toggleTimer()">START TIMER</button>
            <div class="btn-row" style="margin-top:10px;">
                <button onclick="adjustTime(60)">+1 Min</button>
                <button onclick="adjustTime(-60)">-1 Min</button>
                <button onclick="resetTimer()">RESET 0:00</button>
            </div>
        </div>

        <div class="card">
            <h3>Broadcaster Alerts</h3>
            <input type="text" id="alertInput" placeholder="Alert Message (e.g. VIDEO REFEREE)">
            <div class="btn-row">
                <button style="background:#e65100" onclick="toggleAlert(true)">SHOW ALERT</button>
                <button onclick="toggleAlert(false)">HIDE ALERT</button>
            </div>

            <h3>Visuals Setup</h3>
            <label>NRL Logo URL</label>
            <input type="text" id="mainLogoInput" placeholder="Main Logo URL">
            <label>Stadium Background URL</label>
            <input type="text" id="bgUrlInput" placeholder="Stadium BG URL">
            
            <div class="btn-row">
                <div style="flex:1">
                    <label>Home Name</label><input type="text" id="hNameInput">
                    <label>Home Logo URL</label><input type="text" id="hLogoInput">
                </div>
                <div style="flex:1">
                    <label>Away Name</label><input type="text" id="aNameInput">
                    <label>Away Logo URL</label><input type="text" id="aLogoInput">
                </div>
            </div>
            
            <button class="btn-main" style="background:#333" onclick="updateMatchInfo()">SAVE ALL VISUALS</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyA8Ju6YR84BY8r2a7PtAzC41wLiPzU_Qck",
            authDomain: "arl-scoreboard.firebaseapp.com",
            databaseURL: "https://arl-scoreboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "arl-scoreboard",
            storageBucket: "arl-scoreboard.firebasestorage.app",
            messagingSenderId: "530209602301",
            appId: "1:530209602301:web:bf49f782881dbac7135c94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'nrlMatch');

        let currentData = {};
        onValue(matchRef, (snap) => { 
            if(snap.exists()) {
                currentData = snap.val();
                document.getElementById('tBtn').innerText = currentData.isRunning ? "STOP TIMER" : "START TIMER";
                document.getElementById('tBtn').style.background = currentData.isRunning ? "#c62828" : "#2e7d32";
                document.getElementById('disp_hScore').innerText = currentData.hScore || 0;
                document.getElementById('disp_aScore').innerText = currentData.aScore || 0;
            }
        });

        window.triggerTry = (team) => update(matchRef, { [team]: true });
        window.toggleFinals = () => update(matchRef, { isFinals: !currentData.isFinals });
        window.toggleAlert = (show) => update(matchRef, { showAlert: show, alertMsg: document.getElementById('alertInput').value });
        window.changeScore = (f, a) => update(matchRef, { [f]: (currentData[f] || 0) + a });
        window.adjustTime = (s) => update(matchRef, { time: (Number(currentData.time) || 0) + s });
        window.toggleTimer = () => update(matchRef, { isRunning: !currentData.isRunning });
        window.resetTimer = () => update(matchRef, { time: 0, isRunning: false });

        window.updateMatchInfo = () => {
            update(matchRef, {
                mainLogo: document.getElementById('mainLogoInput').value || currentData.mainLogo || "",
                bgUrl: document.getElementById('bgUrlInput').value || currentData.bgUrl || "",
                hName: document.getElementById('hNameInput').value || currentData.hName || "",
                hLogo: document.getElementById('hLogoInput').value || currentData.hLogo || "",
                aName: document.getElementById('aNameInput').value || currentData.aName || "",
                aLogo: document.getElementById('aLogoInput').value || currentData.aLogo || ""
            });
            alert("Settings Updated!");
        };

        setInterval(() => { if(currentData.isRunning) update(matchRef, { time: (Number(currentData.time) || 0) + 1 }); }, 1000);
    </script>
</body>
</html>
