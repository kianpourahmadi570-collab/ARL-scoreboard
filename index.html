<!DOCTYPE html>
<html>
<head>
    <title>ARL LIVE</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { background-size: cover; background-position: center; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; }
        #container { position: relative; width: 1050px; height: 320px; }
        .board { position: relative; width: 100%; height: 100%; background: rgba(15, 15, 15, 0.98); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 50px 100px rgba(0,0,0,0.9); display: flex; flex-direction: column; z-index: 10; }

        /* STATS DRAWER - FIXED POSITIONING */
        #statsOverlay { 
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 850px; background: rgba(10, 10, 10, 0.98); border: 2px solid #333; 
            border-radius: 0 0 15px 15px; padding: 15px 25px; transition: 0.6s ease-in-out; 
            z-index: 5; display: flex; flex-direction: column; opacity: 0; pointer-events: none;
        }
        .stats-active #statsOverlay { bottom: -210px; opacity: 1; }
        
        .stat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 5px 0; }
        .stat-label { font-weight: 800; color: #aaa; text-transform: uppercase; font-size: 11px; letter-spacing: 2px; }
        .stat-val { font-size: 20px; font-weight: 900; width: 100px; text-align: center; color: #ffcc00; }

        .scorer-columns { display: flex; justify-content: space-between; margin-top: 10px; gap: 20px; }
        .scorer-list { width: 45%; font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; line-height: 1.5; }
        #hScorerList { text-align: left; border-left: 3px solid #ffcc00; padding-left: 10px; }
        #aScorerList { text-align: right; border-right: 3px solid #ffcc00; padding-right: 10px; }

        /* OTHER BROADCAST ELEMENTS */
        .header { height: 60px; display: flex; align-items: center; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .timer-center { display: flex; align-items: center; gap: 15px; background: #000; padding: 5px 25px; border-radius: 30px; border: 1px solid #333; }
        #timer { font-size: 32px; font-weight: 900; width: 85px; text-align: center; font-variant-numeric: tabular-nums; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: space-between; padding: 0 60px; }
        .team-name { font-size: 48px; font-weight: 900; text-transform: uppercase; }
        .score { font-size: 110px; font-weight: 900; display: flex; align-items: center; }
        .sticker { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); padding: 8px 40px; font-weight: 900; border-radius: 10px 10px 0 0; font-size: 14px; display: none; text-transform: uppercase; }
        #gfSticker { background: #2e7d32; color: white; border: 1px solid #4caf50; }
    </style>
</head>
<body id="mainBody">
    <div id="container">
        <div class="board">
            <div id="gfSticker" class="sticker">GRAND FINAL</div>
            <div class="header">
                <div style="flex:1; font-weight:700; color:#aaa;">ARL PREMIERSHIP</div>
                <div class="timer-center"><span id="timer">40:00</span></div>
                <div style="flex: 1; text-align: right; font-weight: 900;"><span style="color: #4caf50;" id="matchStatus">1ST HALF</span></div>
            </div>
            <div class="main-content">
                <div class="team-name" id="hName">HOME</div>
                <div class="score"><span id="hScore">0</span><div style="color:#444; margin: 0 10px;">-</div><span id="aScore">0</span></div>
                <div class="team-name" id="aName" style="text-align:right">AWAY</div>
            </div>
        </div>

        <div id="statsOverlay">
            <div class="stat-row">
                <div class="stat-val" id="stat_hTries">0 | 0</div>
                <div class="stat-label">TRIES | GOALS</div>
                <div class="stat-val" id="stat_aTries">0 | 0</div>
            </div>
            <div class="scorer-columns">
                <div id="hScorerList" class="scorer-list"></div>
                <div id="aScorerList" class="scorer-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyA8Ju6YR84BY8r2a7PtAzC41wLiPzU_Qck", authDomain: "arl-scoreboard.firebaseapp.com", databaseURL: "https://arl-scoreboard-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "arl-scoreboard" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const matchRef = ref(db, 'nrlMatch');

        onValue(matchRef, (snap) => {
            const data = snap.val() || {};
            document.getElementById('hScore').innerText = data.hScore || 0;
            document.getElementById('aScore').innerText = data.aScore || 0;
            document.getElementById('hName').innerText = data.hName || "HOME";
            document.getElementById('aName').innerText = data.aName || "AWAY";
            document.getElementById('matchStatus').innerText = data.status || "1ST HALF";
            
            // Drawer Visibility
            document.getElementById('mainBody').classList.toggle('stats-active', !!data.showStats);

            // Stats Row
            document.getElementById('stat_hTries').innerText = `${data.hTries || 0} | ${data.hConv || 0}`;
            document.getElementById('stat_aTries').innerText = `${data.aConv || 0} | ${data.aTries || 0}`;

            // Scorer List - FIXED MAP LOGIC
            const renderScorers = (hist) => {
                if (!hist) return "";
                // Use Object.values to turn Firebase objects into a clean array
                return Object.values(hist).map(entry => `<div>${entry}</div>`).join('');
            };
            document.getElementById('hScorerList').innerHTML = renderScorers(data.hHistory);
            document.getElementById('aScorerList').innerHTML = renderScorers(data.aHistory);

            // Timer
            let t = Number(data.time) || 0;
            document.getElementById('timer').innerText = `${Math.floor(t/60)}:${(t%60).toString().padStart(2, '0')}`;
            
            // Grand Final Sticker
            document.getElementById('gfSticker').style.display = data.isGrandFinal ? 'block' : 'none';
        });
    </script>
</body>
</html>
