<!DOCTYPE html>
<html>
<head>
    <title>ARL Scoreboard - Live</title>
    <style>
        body { 
            /* This sets the stadium background */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1513297887119-d46091b24bfa?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .board { 
            background: rgba(31, 31, 31, 0.9); /* Slightly transparent */
            backdrop-filter: blur(10px); /* Blurs the background behind the board */
            width: 700px; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }

        .header { display: flex; justify-content: space-between; align-items: center; color: #4caf50; font-weight: bold; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        
        .live-container { display: flex; flex-direction: column; align-items: flex-end; width: 100px; }
        .live-indicator { color: #ff4d4d; font-weight: bold; letter-spacing: 2px; animation: blinker 2s linear infinite; }
        #matchStatus { color: #ff4d4d; font-size: 12px; margin-top: 2px; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        .timer-container { text-align: center; flex: 1; }
        #timer { font-size: 32px; font-weight: 800; display: block; color: white; }
        #mainLogo { width: 60px; height: auto; margin-top: 5px; }
        
        .main { display: flex; align-items: center; justify-content: space-between; text-align: center; }
        .team { flex: 1; }
        .team img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; background: rgba(255,255,255,0.05); border-radius: 50%; padding: 10px; }
        .score { font-size: 90px; font-weight: 900; flex: 1.5; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .team-name { font-size: 24px; font-weight: bold; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="board">
        <div class="header">
            <span>AUSTRALIAN RUGBY LEAGUE</span>
            <div class="timer-container">
                <span id="timer">0:00</span>
                <img id="mainLogo" src="https://upload.wikimedia.org/wikipedia/en/0/02/National_Rugby_League_logo.svg">
            </div>
            <div class="live-container">
                <span class="live-indicator">LIVE</span>
                <span id="matchStatus">1ST HALF</span>
            </div>
        </div>
        <div class="main">
            <div class="team">
                <img id="hLogo" src="https://placehold.co/100x100/222/white?text=LOGO">
                <div class="team-name" id="hName">Home</div>
            </div>
            <div class="score">
                <span id="hScore">0</span> - <span id="aScore">0</span>
            </div>
            <div class="team">
                <img id="aLogo" src="https://placehold.co/100x100/222/white?text=LOGO">
                <div class="team-name" id="aName">Away</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA8Ju6YR84BY8r2a7PtAzC41wLiPzU_Qck",
            authDomain: "arl-scoreboard.firebaseapp.com",
            databaseURL: "https://arl-scoreboard-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "arl-scoreboard",
            storageBucket: "arl-scoreboard.firebasestorage.app",
            messagingSenderId: "530209602301",
            appId: "1:530209602301:web:bf49f782881dbac7135c94"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'nrlMatch'), (snap) => {
            const data = snap.val() || {};
            document.getElementById('hScore').innerText = data.hScore ?? 0;
            document.getElementById('aScore').innerText = data.aScore ?? 0;
            document.getElementById('hName').innerText = data.hName || "Home";
            document.getElementById('aName').innerText = data.aName || "Away";
            document.getElementById('matchStatus').innerText = data.status || "1ST HALF";
            
            if (data.hLogo) document.getElementById('hLogo').src = data.hLogo;
            if (data.aLogo) document.getElementById('aLogo').src = data.aLogo;
            if (data.mainLogo) document.getElementById('mainLogo').src = data.mainLogo;
            
            // This part allows you to change the background image via Admin!
            if (data.bgUrl) document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('${data.bgUrl}')`;

            let totalSeconds = Number(data.time) || 0;
            let m = Math.floor(totalSeconds / 60);
            let s = totalSeconds % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        });
    </script>
</body>
</html>
